services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_commerce
      POSTGRES_USER: ai_commerce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_now}
      TZ: Asia/Shanghai
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_commerce -d ai_commerce"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-commerce

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ai-commerce-backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env.prod
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ../data/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-commerce

  web:
    build:
      context: ../../
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ai-commerce-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - ai-commerce

networks:
  ai-commerce:
    driver: bridge
